name: CI/CD

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    name: Tests Backend (PHP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3, intl, zip
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist
        working-directory: backend

      - name: Generate JWT keys (test)
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:test -out config/jwt/private.pem 2048
          openssl rsa -passin pass:test -pubout -in config/jwt/private.pem -out config/jwt/public.pem
        working-directory: backend

      - name: Create test .env.local
        run: |
          cat > .env.local << EOF
          JWT_PASSPHRASE=test
          APP_SECRET=testsecretkey123456789012345678901234
          EOF
        working-directory: backend

      - name: Run PHPUnit tests
        run: php bin/phpunit --coverage-text
        working-directory: backend
        env:
          APP_ENV: test

  test-frontend:
    name: Tests Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: TypeScript check
        run: pnpm exec tsc --noEmit
        working-directory: frontend

      - name: Run Vitest
        run: pnpm vitest run
        working-directory: frontend

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
